<style>
        .fade-in-up {
            animation: fadeInUp 1.2s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .fade-in-delayed {
            animation: fadeIn 1s ease-out 1s forwards;
            opacity: 0;
        }

        .bounce-subtle {
            animation: bounceSubtle 2s infinite ease-in-out;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes bounceSubtle {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(8px);
            }
        }
    </style>
</head>
<body class="bg-surface text-on-surface h-screen w-full flex flex-col justify-center items-center overflow-hidden font-body-lg text-body-lg" style="opacity: 0; transition: opacity 0.5s ease-out;">
<!-- Splash Content -->
<main class="flex flex-col items-center justify-center text-center px-container-padding w-full max-w-7xl mx-auto z-10 relative">
<!-- Greeting -->
<h1 id="welcome-name" class="font-h1 text-h1 text-primary fade-in-up mb-xl tracking-tight uppercase">
            WELCOME BACK, USER
        </h1>
<!-- Subtitle/Hint -->
<div class="fade-in-delayed flex flex-col items-center gap-md">
<p class="font-body-md text-body-md text-secondary">Preparing your dashboard...</p>
<span class="material-symbols-outlined text-primary bounce-subtle" data-icon="keyboard_arrow_down" style="font-size: 32px;">
                keyboard_arrow_down
            </span>
</div>
</main>
<!-- Subtle Background Elements (Optional, for depth) -->
<div class="absolute inset-0 pointer-events-none overflow-hidden z-0 flex items-center justify-center">
<div class="w-[800px] h-[800px] bg-primary-fixed-dim rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-pulse" style="animation-duration: 8s;"></div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        var sessionRaw = localStorage.getItem('wedrive_session');
        var name = 'USER';
        var redirectUrl = '../../../customer/pages/dashboard/customer.html';
        
        if (sessionRaw) {
            try {
                var session = JSON.parse(sessionRaw);
                if (session.name) {
                    name = session.name.split(' ')[0].toUpperCase();
                } else if (session.email) {
                    name = session.email.split('@')[0].toUpperCase();
                }
                
                if (session.role === 'admin') {
                    redirectUrl = '../../../admin/pages/dashboard/admin.html';
                }
            } catch (e) {
                console.error("Session parse error", e);
            }
        }
        
        document.getElementById('welcome-name').textContent = 'WELCOME BACK, ' + name;

        // Fade in
        setTimeout(() => {
            document.body.style.opacity = "1";
        }, 50);

        // Automatic transition to the dashboard
        setTimeout(() => {
            document.body.style.opacity = "0";
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 500); // Wait for fade out
        }, 3000);
    });
</script>

</body></html>
