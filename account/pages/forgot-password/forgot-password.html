<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password | WeDRIVE</title>
  <link rel="icon" type="image/png" href="../../../shared/logo/wedrive-icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
  <link id="theme-link" rel="stylesheet" href="../../../shared/css/theme_day.css" />
  <link rel="stylesheet" href="../../../shared/css/theme_overrides.css" />
  <link rel="stylesheet" href="../../../shared/css/guest-pages.css" />
  <style>
    .reset-wrapper { min-height: 85vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .reset-card { width: 100%; max-width: 420px; background: var(--card-bg,#fff); border: 1px solid var(--border,rgba(0,0,0,.06)); border-radius: 16px; padding: 36px; box-shadow: 0 8px 32px rgba(0,0,0,.06); text-align: center; }
    .reset-card .logo-img { width: 48px; margin-bottom: 16px; }
    .reset-card h1 { font-size: 22px; font-weight: 800; color: var(--text-primary,#1e293b); margin-bottom: 6px; }
    .reset-card .sub { font-size: 14px; color: var(--text-muted,#64748b); margin-bottom: 24px; line-height: 1.5; }
    .reset-form { display: flex; flex-direction: column; gap: 14px; text-align: left; }
    .reset-form label { font-size: 13px; font-weight: 600; color: var(--text-primary,#1e293b); margin-bottom: 4px; display: block; }
    .reset-form input { width: 100%; padding: 10px 14px; border: 1px solid var(--border,rgba(0,0,0,.1)); border-radius: 8px; font-size: 14px; background: var(--bg,#f8fafc); color: var(--text-primary,#1e293b); outline: none; transition: border-color .2s; box-sizing: border-box; }
    .reset-form input:focus { border-color: var(--primary,#2563eb); }
    .reset-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--primary,#2563eb); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .3s; }
    .reset-btn:hover { box-shadow: 0 6px 20px rgba(37,99,235,.3); transform: translateY(-1px); }
    .back-link { display: inline-flex; align-items: center; gap: 4px; margin-top: 16px; font-size: 13px; color: var(--primary,#2563eb); text-decoration: none; font-weight: 600; }
    .back-link:hover { text-decoration: underline; }
    .success-state { display: none; }
    .success-state .material-icons-round { font-size: 48px; color: #10b981; margin-bottom: 12px; }
    .success-state h2 { font-size: 18px; font-weight: 700; color: var(--text-primary,#1e293b); margin-bottom: 8px; }
    .success-state p { font-size: 13px; color: var(--text-muted,#64748b); line-height: 1.6; }
  </style>
</head>
<body>
  <div class="reset-wrapper">
    <div class="reset-card">
      <img class="logo-img" src="../../../shared/logo/wedrive-icon.png" alt="WeDRIVE" />
      <!-- Form State -->
      <div id="form-state">
        <h1>Reset Your Password</h1>
        <p class="sub">Enter the email address linked to your account. We'll send you a reset link.</p>
        <form class="reset-form" onsubmit="event.preventDefault(); document.getElementById('form-state').style.display='none'; document.getElementById('success-state').style.display='block';">
          <div><label>Email Address</label><input type="email" placeholder="your@email.com" require../div>
          <button class="reset-btn" type="submit">Send Reset Link</button>
        </form>
      </div>
      <!-- Success State -->
      <div id="success-state" class="success-state">
        <span class="material-icons-round">mark_email_read</span>
        <h2>Check Your Inbox</h2>
        <p>We've sent a password reset link to your email. Please check your inbox and follow the instructions. The link expires in 30 minutes.</p>
      </div>
      <a class="back-link" href="../login/login.html"><span class="material-icons-round" style="font-size:16px;">arrow_back</span> Back to Sign In</a>
    </div>
  </div>
  <script src="../../../shared/js/main.js"></script>
</body>
</html>
