<!--
  WeDRIVE - Admin Sidebar Component
  shared/components/sidebar-admin.html

  Loaded via fetch() into #sidebar-placeholder on every admin page.
  Active link is detected automatically by sidebar-loader.js using window.location.pathname.

  Link href values must match the actual file paths relative to admin/pages/.
  Logo path resolves via data-base-path set on #sidebar-placeholder by the loader.
-->
<aside class="sidebar" id="admin-sidebar">

  <!-- Brand -->
  <a class="sidebar-brand" data-href="dashboard/admin.html" style="text-decoration: none;">
    <img data-logo src="../../../shared/logo/wedrive-icon.png" alt="WeDRIVE Logo" class="brand-logo-sm" />
    <div class="brand-text">
      <span class="we">We</span><span class="drive">DRIVE</span>
    </div>
  </a>

  <!-- User info -->
  <div class="sidebar-user">
    <div class="avatar">AD</div>
    <div class="user-info">
      <div class="name">Admin</div>
      <div class="role">Car Manager</div>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <div class="nav-section">Main</div>

    <a class="nav-item" data-page="admin" data-href="dashboard/admin.html">
      <span class="material-icons-round">dashboard</span>
      <span data-key="admin_dashboard">Dashboard</span>
    </a>

    <a class="nav-item" data-page="car" data-href="car/cars.html">
      <span class="material-icons-round">directions_car</span>
      <span data-key="sidebar_car">Cars</span>
    </a>

    <a class="nav-item" data-page="bookings" data-href="booking/bookings.html">
      <span class="material-icons-round">pending_actions</span>
      <span data-key="sidebar_bookings">Bookings</span>
    </a>

    <a class="nav-item" data-page="reports" data-href="report/reports.html">
      <span class="material-icons-round">payments</span>
      <span data-key="sidebar_reports">Reports</span>
    </a>

    <a class="nav-item" data-page="calendar" data-href="calendar/calendar.html">
      <span class="material-icons-round">calendar_month</span>
      <span data-key="sidebar_calendar">Calendar</span>
    </a>

    <div class="nav-section">Intelligence</div>



    <a class="nav-item" data-page="chatbot-settings" data-href="chatbot/chatbot.html">
      <span class="material-icons-round">smart_toy</span>
      <span data-key="sidebar_chatbot">AI Chatbot</span>
    </a>

    <a class="nav-item" data-page="customers" data-href="customer/customers.html">
      <span class="material-icons-round">health_and_safety</span>
      <span data-key="sidebar_customers">Customers</span>
    </a>


    <div class="nav-section">Marketing</div>

    <a class="nav-item" data-page="marketing" data-href="marketing/marketing.html">
      <span class="material-icons-round">campaign</span>
      <span>Marketing</span>
    </a>

    <div class="nav-section">System</div>

    <a class="nav-item" data-page="settings" data-href="setting/settings.html">
      <span class="material-icons-round">settings</span>
      <span data-key="sidebar_settings">Settings</span>
    </a>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <a class="nav-item logout" data-href="dashboard/admin.html">
      <span class="material-icons-round">logout</span>
      <span data-key="sidebar_logout">Logout</span>
    </a>
  </div>

</aside>
