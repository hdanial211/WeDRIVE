<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reports | WeDRIVE</title>
  <link rel="icon" type="image/png" href="../../shared/logo/wedrive-icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
  <link id="theme-link" rel="stylesheet" href="../../shared/css/theme_day.css" />
  <link rel="stylesheet" href="../../shared/css/theme_overrides.css" />
  <link rel="stylesheet" href="../../shared/css/animation.css" />
  <link rel="stylesheet" href="../../shared/css/sidebar.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <script src="../../shared/js/auth-guard.js" data-role="admin"></script>
</head>
<body data-particles="6" data-cursor-glow>
  <div id="sidebar-placeholder" data-component="sidebar-admin" data-page="reports"></div>

  <main class="main">
    <div id="navbar-placeholder" data-module="admin"></div>

    <div class="content">
      <!-- SUMMARY STATS -->
      <div class="stats-grid" style="grid-template-columns: repeat(4, 1fr);">
        <div class="stat-card reveal-onload">
          <div class="stat-info">
            <div class="label" data-key="rp_stat_revenue">Total Revenue</div>
            <div class="value" id="rp-revenue" style="font-size:24px">--</div>
          </div>
          <div class="stat-icon blue"><span class="material-icons-round">payments</span></div>
        </div>
        <div class="stat-card reveal-onload">
          <div class="stat-info">
            <div class="label" data-key="rp_stat_bookings">Total Bookings</div>
            <div class="value" id="rp-bookings">--</div>
          </div>
          <div class="stat-icon green"><span class="material-icons-round">receipt_long</span></div>
        </div>
        <div class="stat-card reveal-onload">
          <div class="stat-info">
            <div class="label" data-key="rp_stat_avg">Avg Rental Days</div>
            <div class="value" id="rp-avg">--</div>
          </div>
          <div class="stat-icon amber"><span class="material-icons-round">timer</span></div>
        </div>
        <div class="stat-card reveal-onload">
          <div class="stat-info">
            <div class="label" data-key="rp_stat_rating">Satisfaction</div>
            <div class="value" id="rp-rating">--</div>
          </div>
          <div class="stat-icon purple"><span class="material-icons-round">star</span></div>
        </div>
      </div>

      <!-- CHARTS ROW -->
      <div class="grid-2">
        <!-- Monthly Revenue Chart -->
        <div class="card reveal-on-scroll">
          <div class="card-header">
            <h3 data-key="rp_chart_revenue">Monthly Revenue (RM)</h3>
          </div>
          <div id="revenue-chart" style="padding:12px 0;"></div>
        </div>

        <!-- Car Utilization -->
        <div class="card reveal-on-scroll">
          <div class="card-header">
            <h3 data-key="rp_chart_util">Vehicle Utilization (%)</h3>
          </div>
          <div id="util-chart" style="padding:12px 0;"></div>
        </div>
      </div>

      <!-- SUMMARY INFO -->
      <div class="card reveal-on-scroll">
        <div class="card-header">
          <h3 data-key="rp_summary_title">Performance Summary</h3>
          <button class="btn-primary-sm" onclick="exportReport()">
            <span class="material-icons-round" style="font-size:16px">file_download</span>
            <span data-key="rp_export">Export Report</span>
          </button>
        </div>
        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-top:8px;">
          <div style="padding:20px; background:var(--slate-50); border-radius:12px; text-align:center;">
            <div style="font-size:12px; color:var(--slate-400); font-weight:600; text-transform:uppercase; margin-bottom:8px;" data-key="rp_popular_car">Most Popular Car</div>
            <div id="rp-popular" style="font-size:18px; font-weight:700; color:var(--navy);">--</div>
          </div>
          <div style="padding:20px; background:var(--slate-50); border-radius:12px; text-align:center;">
            <div style="font-size:12px; color:var(--slate-400); font-weight:600; text-transform:uppercase; margin-bottom:8px;" data-key="rp_busiest">Busiest Month</div>
            <div id="rp-busiest" style="font-size:18px; font-weight:700; color:var(--navy);">--</div>
          </div>
          <div style="padding:20px; background:var(--slate-50); border-radius:12px; text-align:center;">
            <div style="font-size:12px; color:var(--slate-400); font-weight:600; text-transform:uppercase; margin-bottom:8px;" data-key="rp_total_rev">Cumulative Revenue</div>
            <div id="rp-total-rev" style="font-size:18px; font-weight:700; color:var(--navy);">--</div>
          </div>
        </div>
      </div>
    </div>

    <div id="footer-placeholder" style="margin-top: 40px; border-radius: 16px; overflow: hidden;"></div>
  </main>

  <script src="../../shared/js/navbar-loader.js"></script>
  <script src="../../shared/js/sidebar-loader.js"></script>
  <script src="../../shared/js/main.js"></script>
  <script src="../../shared/js/api.js"></script>
  <script src="../../shared/js/anime.min.js"></script>
  <script src="../../shared/js/animate.js"></script>
  <script src="../js/reports.js"></script>
</body>
</html>
