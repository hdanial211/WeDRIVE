<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendar | WeDRIVE</title>
  <link rel="icon" type="image/png" href="../../../shared/logo/wedrive-icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
  <link id="theme-link" rel="stylesheet" href="../../../shared/css/theme_day.css" />
  <link rel="stylesheet" href="../../../shared/css/theme_overrides.css" />
  <link rel="stylesheet" href="../../../shared/css/animation.css" />
  <link rel="stylesheet" href="../../../shared/css/sidebar.css" />
  <link rel="stylesheet" href="../../css/admin.css" />

  <!-- AUTH GUARD -->
  <script src="../../../shared/js/auth-guard.js" data-role="admin"></script>
</head>
<body data-particles="6" data-cursor-glow>
  <!-- SIDEBAR -->
  <div id="sidebar-placeholder" data-component="sidebar-admin" data-page="calendar"></div>

  <!-- MAIN -->
  <main class="main">
    <div id="navbar-placeholder" data-module="admin"></div>

    <div class="content">
      <!-- PAGE HEADER (simplified - no nav buttons here) -->
      <div style="margin-bottom:24px">
        <h1 style="font-size:24px;font-weight:700;color:var(--navy)" data-key="cal_title">Calendar Overview</h1>
        <p style="font-size:13px;color:var(--slate-400);margin-top:4px" data-key="cal_subtitle">Monitor bookings, events and seasonal pricing at a glance</p>
      </div>

      <!-- STATS -->
      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:24px">
        <div class="stat-card reveal-onload cal-stat-clickable" onclick="showStatPopup('bookings')" style="cursor:pointer">
          <div class="stat-info">
            <div class="label" data-key="cal_stat_bookings">Bookings This Month</div>
            <div class="value" id="cal-stat-bookings">0</div>
          </div>
          <div class="stat-icon blue"><span class="material-icons-round">event_available</span></div>
        </div>
        <div class="stat-card reveal-onload cal-stat-clickable" onclick="showStatPopup('cars')" style="cursor:pointer">
          <div class="stat-info">
            <div class="label" data-key="cal_stat_cars_rented">Cars Rented Today</div>
            <div class="value" id="cal-stat-rented">0</div>
          </div>
          <div class="stat-icon green"><span class="material-icons-round">directions_car</span></div>
        </div>
        <div class="stat-card reveal-onload cal-stat-clickable" onclick="showStatPopup('events')" style="cursor:pointer">
          <div class="stat-info">
            <div class="label" data-key="cal_stat_events">Active Events</div>
            <div class="value" id="cal-stat-events">0</div>
          </div>
          <div class="stat-icon purple"><span class="material-icons-round">celebration</span></div>
        </div>
        <div class="stat-card reveal-onload cal-stat-clickable" onclick="showStatPopup('revenue')" style="cursor:pointer">
          <div class="stat-info">
            <div class="label" data-key="cal_stat_revenue">Revenue This Month</div>
            <div class="value" id="cal-stat-revenue" style="font-size:24px">RM 0</div>
          </div>
          <div class="stat-icon amber"><span class="material-icons-round">payments</span></div>
        </div>
      </div>

      <!-- STAT POPUP MODAL -->
      <div class="cal-stat-modal-overlay" id="cal-stat-modal" style="display:none">
        <div class="cal-stat-modal">
          <div class="cal-stat-modal-header">
            <h3 id="cal-stat-modal-title" style="display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:var(--navy)"></h3>
            <button class="modal-close-btn" id="cal-stat-modal-close">
              <span class="material-icons-round">close</span>
            </button>
          </div>
          <div id="cal-stat-modal-body" style="padding:16px 20px 20px"></div>
        </div>
      </div>

      <!-- TOOLBAR: Navigation + Legend Filters (combined into one bar) -->
      <div class="card reveal-on-scroll cal-toolbar" style="margin-bottom:20px;padding:14px 22px">
        <div class="cal-toolbar-inner">
          <!-- LEFT: Navigation controls -->
          <div class="cal-nav-group">
            <button class="cal-nav-btn" id="cal-prev" title="Previous Month">
              <span class="material-icons-round">chevron_left</span>
            </button>
            <button class="cal-nav-btn cal-today-btn" id="cal-today" data-key="cal_today">Today</button>
            <button class="cal-nav-btn" id="cal-next" title="Next Month">
              <span class="material-icons-round">chevron_right</span>
            </button>
            
            <!-- Month & Year Dropdowns -->
            <div class="cal-selector-group">
              <select id="cal-month-select" class="cal-dropdown">
                <option value="0">January</option>
                <option value="1">February</option>
                <option value="2">March</option>
                <option value="3">April</option>
                <option value="4">May</option>
                <option value="5">June</option>
                <option value="6">July</option>
                <option value="7">August</option>
                <option value="8">September</option>
                <option value="9">October</option>
                <option value="10">November</option>
                <option value="11">December</option>
              </select>
              <select id="cal-year-select" class="cal-dropdown">
                <!-- Populated by JS -->
              </select>
            </div>
          </div>

          <!-- RIGHT: Legend filter checkboxes -->
          <div class="cal-legend-filters">
            <label class="cal-filter-chip active" data-filter="booking">
              <input type="checkbox" checked id="filter-booking" />
              <span class="cal-chip-dot booking-dot"></span>
              <span data-key="cal_legend_booking">Booking</span>
            </label>
            <label class="cal-filter-chip active" data-filter="event">
              <input type="checkbox" checked id="filter-event" />
              <span class="cal-chip-dot event-dot"></span>
              <span data-key="cal_legend_event">Event / Promo</span>
            </label>
            <label class="cal-filter-chip active" data-filter="seasonal">
              <input type="checkbox" checked id="filter-seasonal" />
              <span class="cal-chip-dot seasonal-dot"></span>
              <span data-key="cal_legend_seasonal">Seasonal Pricing</span>
            </label>
            <label class="cal-filter-chip active" data-filter="available">
              <input type="checkbox" checked id="filter-available" />
              <span class="cal-chip-dot available-dot"></span>
              <span data-key="cal_legend_available">Available</span>
            </label>
          </div>
        </div>
      </div>

      <!-- CALENDAR GRID -->
      <div class="card reveal-on-scroll" style="padding:0;overflow:hidden">
        <!-- Day headers -->
        <div class="adm-cal-header">
          <div data-key="cal_sun">Sun</div>
          <div data-key="cal_mon">Mon</div>
          <div data-key="cal_tue">Tue</div>
          <div data-key="cal_wed">Wed</div>
          <div data-key="cal_thu">Thu</div>
          <div data-key="cal_fri">Fri</div>
          <div data-key="cal_sat">Sat</div>
        </div>
        <!-- Calendar cells rendered by JS -->
        <div class="adm-cal-grid" id="cal-grid"></div>
      </div>

      <!-- DAY DETAIL MODAL (Premium Popup) -->
      <div class="cal-day-modal-overlay" id="cal-detail-panel" style="display:none">
        <div class="cal-day-modal">
          <div class="cal-day-modal-header" id="cal-detail-header">
            <div class="cal-day-modal-header-content">
              <div class="cal-day-modal-date" id="cal-detail-day-num"></div>
              <div>
                <h3 id="cal-detail-title" style="margin:0;font-size:18px;font-weight:700;color:white"></h3>
                <div id="cal-detail-subtitle" style="font-size:12px;color:rgba(255,255,255,0.8);margin-top:2px"></div>
              </div>
            </div>
            <button class="cal-day-modal-close" id="cal-detail-close">
              <span class="material-icons-round">close</span>
            </button>
          </div>
          <div id="cal-detail-body" class="cal-day-modal-body"></div>
        </div>
      </div>

    </div><!-- /content -->

    <!-- FOOTER -->
    <div id="footer-placeholder" style="margin-top:40px;border-radius:16px;overflow:hidden"></div>
  </main>

  <script src="../../../shared/js/navbar-loader.js"></script>
  <script src="../../../shared/js/sidebar-loader.js"></script>
  <script src="../../../shared/js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../../shared/js/supabase-config.js"></script>
  <script src="../../../shared/js/api.js"></script>
  <script src="../../../shared/js/anime.min.js"></script>
  <script src="../../../shared/js/animate.js"></script>
  <script src="../../js/calendar.js"></script>
</body>
</html>
