<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings | WeDRIVE</title>
  <link rel="icon" type="image/png" href="../../../shared/logo/wedrive-icon.png" />
  <link rel="apple-touch-icon" href="../../../shared/logo/wedrive-icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
  <link id="theme-link" rel="stylesheet" href="../../../shared/css/theme_day.css" />
  <link rel="stylesheet" href="../../../shared/css/theme_overrides.css" />
  <link rel="stylesheet" href="../../../shared/css/animation.css" />
  <link rel="stylesheet" href="../../../shared/css/sidebar.css" />
  <link rel="stylesheet" href="../../css/admin.css" />
  <style>
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    .settings-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border-color, #E2E8F0);
      box-shadow: var(--shadow, 0 4px 6px rgba(0,0,0,0.02));
      transition: all 0.3s ease;
    }
    .settings-card:hover {
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.05);
      border-color: var(--primary-light, rgba(59, 130, 246, 0.2));
    }
    .settings-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--slate-100, #F1F5F9);
    }
    .settings-header h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }
    .settings-header .material-icons-round {
      color: var(--primary);
      font-size: 22px;
    }
    .form-grid-custom {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }
    .input-wrap-sm {
      background: var(--input-bg, #fff) !important;
      border-color: var(--border-color, #E2E8F0) !important;
    }
    .input-wrap-sm input {
      color: var(--text-primary) !important;
    }
    .input-wrap-sm span.material-icons-round {
      color: var(--slate-400) !important;
    }
    .settings-hero {
      background: linear-gradient(135deg, var(--primary), #1D4ED8);
      border-radius: 16px;
      padding: 30px;
      color: #fff;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.15);
    }
    .settings-hero::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 300px;
      height: 300px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      pointer-events: none;
    }
    .settings-hero h2 {
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 6px 0;
    }
    .settings-hero p {
      font-size: 14px;
      opacity: 0.85;
      margin: 0;
    }
    .settings-hero .hero-icon {
      position: absolute;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 70px;
      opacity: 0.15;
      pointer-events: none;
    }
    @media (max-width: 900px) {
      .settings-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script src="../../../shared/js/auth-guard.js" data-role="admin"></script>
</head>
<body data-particles="6" data-cursor-glow>
  <div id="sidebar-placeholder" data-component="sidebar-admin" data-page="settings"></div>

  <main class="main">
    <div id="navbar-placeholder" data-module="admin"></div>

    <div class="content">
      <!-- HERO HEADER -->
      <div class="settings-hero reveal-onload">
        <h2 data-key="st_company_settings">System Settings</h2>
        <p>Manage company details, operational configurations, tax values, and rental rules.</p>
        <span class="material-icons-round hero-icon">settings</span>
      </div>

      <div class="settings-grid">
        <!-- COMPANY DETAILS -->
        <div class="settings-card reveal-onload">
          <div class="settings-header">
            <span class="material-icons-round">business</span>
            <h3 data-key="st_company_title">Company Details</h3>
          </div>
          <div class="form-grid-custom">
            <div class="form-group">
              <label data-key="st_name">Company Name</label>
              <div class="input-wrap-sm">
                <span class="material-icons-round">business</span>
                <input type="text" id="st-name" />
              </div>
            </div>
            <div class="form-group">
              <label data-key="st_email">Email</label>
              <div class="input-wrap-sm">
                <span class="material-icons-round">email</span>
                <input type="email" id="st-email" />
              </div>
            </div>
            <div class="form-group">
              <label data-key="st_phone">Phone</label>
              <div class="input-wrap-sm">
                <span class="material-icons-round">phone</span>
                <input type="text" id="st-phone" />
              </div>
            </div>
            <div class="form-group">
              <label data-key="st_address">Address</label>
              <div class="input-wrap-sm">
                <span class="material-icons-round">place</span>
                <input type="text" id="st-address" />
              </div>
            </div>
          </div>
        </div>

        <!-- RENTAL SETTINGS -->
        <div class="settings-card reveal-on-scroll">
          <div class="settings-header">
            <span class="material-icons-round">rule</span>
            <h3 data-key="st_rental_title">Rental Configuration</h3>
          </div>
          <div class="form-grid-custom">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
              <div class="form-group">
                <label data-key="st_currency">Currency</label>
                <div class="input-wrap-sm">
                  <span class="material-icons-round">monetization_on</span>
                  <input type="text" id="st-currency" />
                </div>
              </div>
              <div class="form-group">
                <label data-key="st_tax">Tax Rate (%)</label>
                <div class="input-wrap-sm">
                  <span class="material-icons-round">percent</span>
                  <input type="number" id="st-tax" />
                </div>
              </div>
            </div>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
              <div class="form-group">
                <label data-key="st_min_days">Min Rental Days</label>
                <div class="input-wrap-sm">
                  <span class="material-icons-round">today</span>
                  <input type="number" id="st-min-days" />
                </div>
              </div>
              <div class="form-group">
                <label data-key="st_max_days">Max Rental Days</label>
                <div class="input-wrap-sm">
                  <span class="material-icons-round">date_range</span>
                  <input type="number" id="st-max-days" />
                </div>
              </div>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
              <div class="form-group">
                <label data-key="st_late_fee">Late Fee (RM/hour)</label>
                <div class="input-wrap-sm">
                  <span class="material-icons-round">schedule</span>
                  <input type="number" id="st-late-fee" />
                </div>
              </div>
              <div class="form-group">
                <label data-key="st_deposit">Deposit (%)</label>
                <div class="input-wrap-sm">
                  <span class="material-icons-round">savings</span>
                  <input type="number" id="st-deposit" />
                </div>
              </div>
            </div>

            <div class="form-group">
              <label data-key="st_hours">Operating Hours</label>
              <div class="input-wrap-sm">
                <span class="material-icons-round">alarm</span>
                <input type="text" id="st-hours" />
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- PICKUP LOCATIONS (Hidden by default or display:none, kept for compatibility) -->
      <div class="settings-card reveal-on-scroll" style="margin-bottom:24px; display:none;">
        <div class="settings-header">
          <span class="material-icons-round">location_on</span>
          <h3 data-key="st_locations_title">Pick-up Locations</h3>
        </div>
        <div id="locations-list" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
      </div>

      <!-- SAVE BUTTON -->
      <div class="reveal-on-scroll" style="display:flex; justify-content:flex-end; gap:12px; margin-top:16px;">
        <button class="btn-primary-sm" onclick="saveSettings()" style="padding:14px 36px; font-size:14px; border-radius:12px; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);">
          <span class="material-icons-round" style="font-size:18px">save</span>
          <span data-key="st_save">Save Changes</span>
        </button>
      </div>
    </div>

    <div id="footer-placeholder" style="margin-top: 40px; border-radius: 16px; overflow: hidden;"></div>
  </main>

  <script src="../../../shared/js/navbar-loader.js"></script>
  <script src="../../../shared/js/sidebar-loader.js"></script>
  <script src="../../../shared/js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../../shared/js/supabase-config.js"></script>
  <script src="../../../shared/js/api.js"></script>
  <script src="../../../shared/js/anime.min.js"></script>
  <script src="../../../shared/js/animate.js"></script>
  <script src="../../js/settings.js"></script>
</body>
</html>
