<!--
  WeDRIVE Reusable Navbar Component
  shared/components/navbar.html

  Loaded dynamically by shared/js/navbar-loader.js.
  The loader sets data-module="customer" or data-module="admin"
  on the placeholder div, and this template renders accordingly.
-->
<nav class="navbar" id="wedrive-navbar">

  <!-- BRAND -->
  <div class="nav-brand">
    <img class="brand-logo" id="navbar-logo" src="" alt="WeDRIVE Logo" />
    <div class="brand-text">
      <span class="we">We</span><span class="drive">DRIVE</span>
    </div>
  </div>

  <!-- LINKS: rendered by navbar-loader.js based on data-module -->
  <div class="nav-links" id="navbar-links"></div>

  <!-- ACTIONS: shared controls + module-specific right side -->
  <div class="nav-actions" id="navbar-actions">
    <button class="lang-toggle" onclick="toggleLanguage()" aria-label="Switch Language">
      <span class="lang-text">MS</span>
    </button>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
      <span class="material-icons-round">dark_mode</span>
    </button>
    <!-- Module-specific buttons injected here by navbar-loader.js -->
    <div id="navbar-module-actions"></div>
  </div>

</nav>
