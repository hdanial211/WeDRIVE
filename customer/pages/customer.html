<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book a Car | WeDRIVE</title>
  <link rel="icon" type="image/png" href="../../shared/logo/wedrive-icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
  <link id="theme-link" rel="stylesheet" href="../../shared/css/theme_day.css" />
  <link rel="stylesheet" href="../../shared/css/theme_overrides.css" />
  <link rel="stylesheet" href="../css/customer.css" />
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand">
      <img src="../../shared/logo/wedrive-icon.png" alt="Logo" class="brand-logo" />
      <div class="brand-text">
        <span class="we">We</span><span class="drive">DRIVE</span>
      </div>
    </div>
    <div class="nav-links">
      <a href="customer.html" class="nav-link active" data-key="nav_browse">Browse Cars</a>
      <a href="#" class="nav-link" data-key="nav_bookings">My Bookings</a>
      <a href="#" class="nav-link" data-key="nav_how">How It Works</a>
      <a href="#" class="nav-link" onclick="toggleChat(); return false;" data-key="nav_ai">AI Assistant</a>
    </div>
    <div class="nav-actions">
      <!-- Language Toggle -->
      <button class="lang-toggle" onclick="toggleLanguage()" aria-label="Tukar ke Bahasa Malaysia">
        <span class="toggle-icon-left" style="font-size:10px;font-weight:800;left:8px;">EN</span>
        <span class="toggle-knob-icon">
          <span class="material-icons-round" style="font-size:13px;">translate</span>
        </span>
        <span class="toggle-icon-right" style="font-size:10px;font-weight:800;right:7px;">BM</span>
      </button>
      <!-- Theme Toggle -->
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Switch to Night Mode">
        <span class="toggle-icon-left">
          <span class="material-icons-round" style="font-size:13px;">light_mode</span>
        </span>
        <span class="toggle-knob-icon">
          <span class="material-icons-round">light_mode</span>
        </span>
        <span class="toggle-icon-right">
          <span class="material-icons-round" style="font-size:13px;">dark_mode</span>
        </span>
      </button>
      <button class="btn-outline" onclick="window.location='../../index.html'" data-key="nav_login">Log In</button>
      <button class="btn-primary" data-key="nav_signup">Sign Up</button>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h1>Find Your Perfect <span>Rental Car</span></h1>
    <p>AI-powered recommendations · Best prices guaranteed · Instant booking</p>
    <div class="search-box">
      <div class="search-grid">
        <div class="search-field">
          <label>Pick-up Location</label>
          <div class="input-wrap">
            <span class="material-icons-round">location_on</span>
            <input type="text" placeholder="Melaka, Malaysia" />
          </div>
        </div>
        <div class="search-field">
          <label>Pick-up Date</label>
          <div class="input-wrap">
            <span class="material-icons-round">calendar_today</span>
            <input type="date" />
          </div>
        </div>
        <div class="search-field">
          <label>Return Date</label>
          <div class="input-wrap">
            <span class="material-icons-round">event</span>
            <input type="date" />
          </div>
        </div>
        <button class="btn-search">
          <span class="material-icons-round" style="font-size:18px">search</span>
          Search
        </button>
      </div>
    </div>
  </section>

  <!-- CONTENT -->
  <div class="content">
    <div class="filter-bar">
      <button class="filter-chip active" onclick="filterCars('all', this)">All Cars</button>
      <button class="filter-chip" onclick="filterCars('sedan', this)">Sedan</button>
      <button class="filter-chip" onclick="filterCars('suv', this)">SUV</button>
      <button class="filter-chip" onclick="filterCars('hatchback', this)">Hatchback</button>
      <button class="filter-chip" onclick="filterCars('van', this)">Van</button>
      <button class="filter-chip" onclick="filterCars('luxury', this)">Luxury</button>
      <span class="results-count">Showing <strong>6</strong> cars available</span>
    </div>

    <div class="cars-grid" id="cars-grid">
      <!-- Car cards injected by JS -->
    </div>
  </div>

  <!-- CHATBOT PANEL -->
  <div class="chatbot-panel" id="chatbot-panel">
    <div class="chat-panel-header">
      <div class="chat-bot-info">
        <div class="chat-bot-avatar"><span class="material-icons-round">smart_toy</span></div>
        <div>
          <div class="chat-bot-name">WeDRIVE AI</div>
          <div class="chat-bot-status"><div class="status-dot-sm"></div> Online · Ready to help</div>
        </div>
      </div>
      <button class="chat-close-btn" onclick="toggleChat()">
        <span class="material-icons-round">close</span>
      </button>
    </div>
    <div class="chat-suggestions">
      <button class="sug-chip" onclick="quickSend('Cars available today?')">Available cars</button>
      <button class="sug-chip" onclick="quickSend('Recommend me a car')">Recommend</button>
      <button class="sug-chip" onclick="quickSend('How to book?')">How to book</button>
      <button class="sug-chip" onclick="quickSend('Payment options?')">Payment</button>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-wrap">
      <textarea class="chat-input" id="chat-input" rows="1"
        placeholder="Ask about cars, bookings..."
        onkeydown="chatKey(event)" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"
      ></textarea>
      <button class="chat-send" onclick="sendChat()"><span class="material-icons-round">send</span></button>
    </div>
  </div>

  <!-- CHATBOT FAB -->
  <div class="chatbot-fab" id="chatbot-fab" onclick="toggleChat()">
    <span class="material-icons-round" id="fab-icon">smart_toy</span>
    <div class="fab-label">AI Assistant</div>
    <div class="notif-badge" id="notif-badge">1</div>
  </div>

  <script src="../js/customer.js"></script>
  <script src="../../shared/js/theme.js"></script>
  <script src="../../shared/js/lang.js"></script>
</body>
</html>
