<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | WeDRIVE Customer</title>
  <link rel="icon" type="image/png" href="../../shared/logo/wedrive-icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
  <link id="theme-link" rel="stylesheet" href="../../shared/css/theme_day.css" />
  <link rel="stylesheet" href="../../shared/css/theme_overrides.css" />
  <link rel="stylesheet" href="../../shared/css/animation.css" />
  <link rel="stylesheet" href="../css/customer.css" />
</head>
<body data-particles="10" data-cursor-glow>
  <!-- NAVBAR -->
  <div id="navbar-placeholder" data-module="customer"></div>
  <!-- HERO -->
  <section class="hero">
    <div class="hero-greeting reveal-onload" id="hero-greeting">
      <span class="material-icons-round" style="font-size:20px;vertical-align:middle">waving_hand</span>
      <span data-key="cust_welcome">Welcome back!</span>
    </div>
    <h1 class="reveal-onload" data-key="cust_hero_title">Find Your Perfect <span>Rental Car</span></h1>
    <p class="reveal-onload" data-key="cust_hero_sub">AI-powered recommendations · Best prices guaranteed · Instant booking</p>
    <div class="search-box reveal-onload">
      <div class="search-grid">
        <div class="search-field">
          <label data-key="cust_pickup_loc">Pick-up Location</label>
          <div class="input-wrap">
            <span class="material-icons-round">location_on</span>
            <input type="text" placeholder="Melaka, Malaysia" />
          </div>
        </div>
        <div class="search-field">
          <label data-key="search_from">Pick-up Date</label>
          <div class="input-wrap">
            <span class="material-icons-round">calendar_today</span>
            <input type="date" />
          </div>
        </div>
        <div class="search-field">
          <label data-key="search_to">Return Date</label>
          <div class="input-wrap">
            <span class="material-icons-round">event</span>
            <input type="date" />
          </div>
        </div>
        <button class="btn-search">
          <span class="material-icons-round" style="font-size:18px">search</span>
          <span data-key="search_btn">Search</span>
        </button>
      </div>
    </div>
  </section>

  <!-- CONTENT -->
  <div class="content">
    <div class="filter-bar reveal-on-scroll">
      <button class="filter-chip active" onclick="filterCars('all', this)" data-key="filter_all">All Cars</button>
      <button class="filter-chip" onclick="filterCars('sedan', this)" data-key="filter_sedan">Sedan</button>
      <button class="filter-chip" onclick="filterCars('suv', this)" data-key="filter_suv">SUV</button>
      <button class="filter-chip" onclick="filterCars('hatchback', this)" data-key="filter_hatch">Hatchback</button>
      <button class="filter-chip" onclick="filterCars('van', this)" data-key="filter_van">Van</button>
      <button class="filter-chip" onclick="filterCars('luxury', this)" data-key="filter_luxury">Luxury</button>
      <span class="results-count" data-key="cust_showing">Showing <strong>6</strong> cars available</span>
    </div>

    <div class="cars-grid" id="cars-grid">
      <!-- Car cards injected by JS -->
    </div>
  </div>

  <!-- CHATBOT -->
  <div id="chatbot-placeholder"></div>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <script src="../../shared/js/navbar-loader.js"></script>
  <script src="../../shared/js/api.js"></script>
  <script src="../../shared/js/chatbot.js"></script>
  <script src="../js/customer.js"></script>
  <script src="../../shared/js/anime.min.js"></script>
  <script src="../../shared/js/animate.js"></script>
  <script src="../../shared/js/main.js"></script>
</body>
</html>
