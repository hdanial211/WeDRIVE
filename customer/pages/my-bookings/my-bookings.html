<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Bookings | WeDRIVE</title>
  <meta name="description" content="Track and manage all your car rentals with WeDRIVE." />
  <link rel="icon" type="image/png" href="../../../shared/logo/wedrive-icon.png" />
  <link rel="apple-touch-icon" href="../../../shared/logo/wedrive-icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
  <link id="theme-link" rel="stylesheet" href="../../../shared/css/theme_day.css" />
  <link rel="stylesheet" href="../../../shared/css/theme_overrides.css" />
  <link rel="stylesheet" href="../../../shared/css/animation.css" />
  <link rel="stylesheet" href="../../css/customer.css?v=6.7.0" />
</head>
<body data-particles="10" data-cursor-glow>

  <!-- SIDEBAR & MOBILE BAR -->
  <div id="customer-sidebar-placeholder"></div>
  <div id="mobile-menu-placeholder"></div>

  <main class="customer-main" id="customer-main">
    <!-- UTILITY BAR -->
    <header class="utility-bar">
      <div>
        <h1 class="utility-title" data-key="mybk_title">My Bookings</h1>
        <p class="utility-subtitle" data-key="mybk_subtitle">Track and manage all your rentals</p>
      </div>
      <div class="utility-actions"></div>
    </header>

    <div class="main-content-area">

      <!-- Stats Row -->
      <div class="mybk-stats">
        <div class="mybk-stat">
          <div class="mybk-stat-icon blue"><span class="material-icons-round">history</span></div>
          <div>
            <span class="mybk-stat-label" data-key="mybk_total">Total Bookings</span>
            <div class="mybk-stat-value" id="stat-total">--</div>
          </div>
        </div>
        <div class="mybk-stat">
          <div class="mybk-stat-icon green"><span class="material-icons-round">directions_car</span></div>
          <div>
            <span class="mybk-stat-label" data-key="mybk_active">Active Rentals</span>
            <div class="mybk-stat-value" id="stat-active">--</div>
          </div>
        </div>
        <div class="mybk-stat">
          <div class="mybk-stat-icon slate"><span class="material-icons-round">payments</span></div>
          <div>
            <span class="mybk-stat-label" data-key="mybk_spent">Total Spent</span>
            <div class="mybk-stat-value" id="stat-spent">--</div>
          </div>
        </div>
      </div>

      <!-- Active Rental Highlight (dynamic) -->
      <div class="active-rental" id="active-rental-section" style="display:none;">
        <div class="active-rental-img">
          <img id="active-car-img" src="" alt="" onerror="this.onerror=null;this.src='../../../shared/model/Sedan/2023 BMW 320i M Sport 2.0/exterior/full-res/frame-125.jpg'" />
          <span class="active-badge">ACTIVE</span>
        </div>
        <div class="active-rental-body">
          <div>
            <div class="active-rental-head">
              <div>
                <span class="active-rental-label" data-key="mybk_currently">Currently Driving</span>
                <h2 id="active-car-name">--</h2>
                <p class="active-rental-meta" id="active-car-meta">--</p>
              </div>
              <div class="active-rental-total">
                <span class="active-rental-price" id="active-car-price">--</span>
                <p class="active-rental-price-label" data-key="mybk_total_rental">Total Rental</p>
              </div>
            </div>
            <div class="rental-progress">
              <div class="rental-progress-row">
                <span id="active-day-info">--</span>
                <span id="active-time-left">--</span>
              </div>
              <div class="rental-progress-bar"><div class="rental-progress-fill" id="active-progress-fill"></div></div>
            </div>
          </div>
          <div class="active-actions">
            <button class="active-action-btn primary" type="button" onclick="handleBookingAction('access')"><span class="material-icons-round">key</span> <span>Access Car</span></button>
            <button class="active-action-btn outline" type="button" onclick="handleBookingAction('extend')"><span class="material-icons-round">calendar_month</span> <span data-key="mybk_extend">Extend Rental</span></button>
            <button class="active-action-btn outline" type="button" onclick="handleBookingAction('report')"><span class="material-icons-round">report</span> <span data-key="mybk_report">Report Issue</span></button>
          </div>
        </div>
      </div>

      <!-- Filter Tabs -->
      <div class="mybk-tabs">
        <button class="mybk-tab active" type="button" data-filter="all" data-key="mybk_all">All Bookings</button>
        <button class="mybk-tab" type="button" data-filter="Active" data-key="mybk_tab_active">Active</button>
        <button class="mybk-tab" type="button" data-filter="Pending" data-key="mybk_tab_upcoming">Upcoming</button>
        <button class="mybk-tab" type="button" data-filter="Completed" data-key="mybk_tab_completed">Completed</button>
        <button class="mybk-tab" type="button" data-filter="Cancelled" data-key="mybk_tab_cancelled">Cancelled</button>
      </div>

      <!-- Booking Cards (rendered dynamically) -->
      <div class="mybk-list" id="mybk-list">
        <div style="text-align:center;padding:40px;color:var(--text-secondary);">Loading bookings...</div>
      </div>

      <!-- Pagination -->
      <div class="mybk-pagination" id="mybk-pagination"></div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <!-- CHATBOT -->
  <div id="chatbot-placeholder"></div>
  <script src="../../js/sidebar-loader.js?v=6.7.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../../shared/js/supabase-config.js"></script>
  <script src="../../../shared/js/api.js"></script>
  <script src="../../../shared/js/chatbot.js"></script>
  <script src="../../../shared/js/anime.min.js"></script>
  <script src="../../../shared/js/animate.js"></script>
  <script src="../../../shared/js/main.js?v=6.7.0"></script>
  <script>
    var allBookings = [];
    var currentFilter = 'all';
    var currentPage = 1;
    var perPage = 6;

    // Root prefix helper
    function rootPrefix() {
      var depth = window.location.pathname.split('/').filter(Boolean).length;
      if (window.location.protocol === 'file:') {
        var idx = window.location.pathname.indexOf('/customer/');
        if (idx > -1) return window.location.pathname.substring(0, idx) + '/';
      }
      return '../../../';
    }

    // Format date nicely
    function fmtDate(d) {
      if (!d) return '--';
      var dt = new Date(d);
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[dt.getMonth()] + ' ' + dt.getDate() + ', ' + dt.getFullYear();
    }

    // Format currency
    function fmtRM(n) {
      return 'RM ' + Number(n || 0).toLocaleString('en-MY', {minimumFractionDigits:2, maximumFractionDigits:2});
    }

    // Get image path for car
    function carImgPath(booking) {
      var name = booking.car || '';
      var mapping = {
        '2023 BMW 320i M Sport 2.0': 'Sedan/2023 BMW 320i M Sport 2.0',
        '2023 Mercedes-Benz GLA250 AMG Line 2.0': 'SUV/2023 Mercedes-Benz GLA250 AMG Line 2.0',
        '2024 Toyota Camry 2.5V': 'Sedan/2024 Toyota Camry 2.5V',
        '2022 Perodua Myvi 1.5 H': 'Hatchback/2022 Perodua Myvi 1.5 H',
        '2023 Honda City 1.5 V': 'Sedan/2023 Honda City 1.5 V',
        '2024 Proton X50 1.5 TGDI Flagship': 'SUV/2024 Proton X50 1.5 TGDI Flagship',
        '2024 Perodua Ativa 1.0T H': 'SUV/2024 Perodua Ativa 1.0T H',
        '2023 Toyota Vios 1.5 G': 'Sedan/2023 Toyota Vios 1.5 G'
      };
      var path = mapping[name];
      if (path) return rootPrefix() + 'shared/model/' + path + '/exterior/full-res/frame-140.jpg';
      return rootPrefix() + 'shared/model/Sedan/2023 BMW 320i M Sport 2.0/exterior/full-res/frame-125.jpg';
    }

    // Status badge class
    function statusClass(s) {
      if (s === 'Active') return 'active';
      if (s === 'Pending') return 'upcoming';
      if (s === 'Completed') return 'completed';
      if (s === 'Cancelled') return 'cancelled';
      return '';
    }

    // Status display text
    function statusLabel(s) {
      if (s === 'Pending') return 'Upcoming';
      return s || '--';
    }

    // Render stats
    function renderStats(bookings) {
      document.getElementById('stat-total').textContent = bookings.length;
      var active = bookings.filter(function(b) { return b.status === 'Active'; });
      document.getElementById('stat-active').textContent = active.length;
      var spent = bookings.reduce(function(sum, b) {
        return sum + (b.status !== 'Cancelled' && b.payment === 'Paid' ? (b.total || 0) : 0);
      }, 0);
      document.getElementById('stat-spent').textContent = fmtRM(spent);
    }

    // Render active rental highlight
    function renderActiveRental(bookings) {
      var section = document.getElementById('active-rental-section');
      var active = bookings.filter(function(b) { return b.status === 'Active'; });
      if (active.length === 0) { section.style.display = 'none'; return; }
      var b = active[0];
      section.style.display = '';
      document.getElementById('active-car-img').src = carImgPath(b);
      document.getElementById('active-car-img').alt = b.car || '';
      document.getElementById('active-car-name').textContent = b.car || '--';
      document.getElementById('active-car-meta').textContent = 'ID: ' + (b.booking_id || '--') + ' -- Pick-up: ' + (b.pickup || '--');
      document.getElementById('active-car-price').textContent = fmtRM(b.total);

      var start = new Date(b.start_date);
      var end = new Date(b.end_date);
      var now = new Date();
      var totalMs = end - start;
      var elapsedMs = now - start;
      var dayNum = Math.max(1, Math.ceil(elapsedMs / 86400000));
      var totalDays = b.days || Math.ceil(totalMs / 86400000);
      var pct = Math.min(100, Math.max(5, (elapsedMs / totalMs) * 100));

      document.getElementById('active-day-info').textContent = 'Day ' + dayNum + ' of ' + totalDays;
      var hoursLeft = Math.max(0, Math.floor((end - now) / 3600000));
      var minsLeft = Math.max(0, Math.floor(((end - now) % 3600000) / 60000));
      document.getElementById('active-time-left').textContent = 'Ends in ' + hoursLeft + 'h ' + minsLeft + 'm';
      document.getElementById('active-progress-fill').style.width = pct + '%';
    }

    // Render booking cards
    function renderBookings() {
      var filtered = currentFilter === 'all' ? allBookings : allBookings.filter(function(b) { return b.status === currentFilter; });
      var totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
      if (currentPage > totalPages) currentPage = totalPages;
      var start = (currentPage - 1) * perPage;
      var pageItems = filtered.slice(start, start + perPage);

      var listEl = document.getElementById('mybk-list');
      if (pageItems.length === 0) {
        listEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);">No bookings found.</div>';
        renderPagination(0, 0);
        return;
      }

      var html = '';
      pageItems.forEach(function(b) {
        var isFaded = (b.status === 'Completed' || b.status === 'Cancelled');
        var isGray = isFaded;
        html += '<div class="mybk-card' + (isFaded ? ' faded' : '') + '">';
        html += '  <div class="mybk-card-img' + (isGray ? ' grayscale' : '') + '">';
        html += '    <img src="' + carImgPath(b) + '" alt="' + (b.car || '') + '" onerror="this.onerror=null;this.src=\'' + rootPrefix() + 'shared/model/Sedan/2023 BMW 320i M Sport 2.0/exterior/full-res/frame-125.jpg\'" />';
        html += '  </div>';
        html += '  <div class="mybk-card-body">';
        html += '    <div><div class="mybk-card-name">' + (b.car || '--') + '</div>';
        html += '    <div class="mybk-card-id">' + (b.booking_id || '--') + '</div></div>';
        html += '    <div><div class="mybk-card-label">Rental Period</div>';
        html += '    <div class="mybk-card-date">' + fmtDate(b.start_date) + ' - ' + fmtDate(b.end_date) + '</div></div>';
        html += '    <div><div class="mybk-card-label">Status</div>';
        html += '    <span class="status-badge ' + statusClass(b.status) + '">' + statusLabel(b.status) + '</span></div>';
        html += '    <div>';
        html += '      <div class="mybk-card-price' + (b.status === 'Cancelled' ? ' is-muted' : '') + '">' + (b.status === 'Cancelled' ? 'RM 0.00' : fmtRM(b.total)) + '</div>';
        html += '      <div class="mybk-card-actions">';
        if (b.status === 'Active') {
          html += '<button class="view-btn" type="button" onclick="handleBookingAction(\'access\')">Access Car</button>';
        } else if (b.status === 'Pending') {
          html += '<button class="view-btn" type="button" onclick="handleBookingAction(\'view-upcoming\')">View Details</button>';
          html += '<span class="divider">|</span>';
          html += '<button class="cancel-btn" type="button" onclick="handleBookingAction(\'cancel\')">Cancel</button>';
        } else if (b.status === 'Completed') {
          html += '<button class="view-btn" type="button" onclick="location.href=\'receipt/receipt.html\'">Receipt</button>';
          html += '<span class="divider">|</span>';
          html += '<button class="rebook-btn" type="button" onclick="location.href=\'../dashboard/customer.html\'">Rebook</button>';
        } else {
          html += '<button class="rebook-btn" type="button" onclick="location.href=\'../dashboard/customer.html\'">Rebook</button>';
        }
        html += '      </div>';
        html += '    </div>';
        html += '  </div>';
        html += '</div>';
      });
      listEl.innerHTML = html;
      renderPagination(totalPages, filtered.length);
    }

    // Render pagination
    function renderPagination(totalPages, totalItems) {
      var pagEl = document.getElementById('mybk-pagination');
      if (totalPages <= 1) { pagEl.innerHTML = ''; return; }
      var html = '';
      html += '<button class="mybk-page-btn" type="button"' + (currentPage <= 1 ? ' disabled' : ' onclick="goPage(' + (currentPage - 1) + ')"') + '><span class="material-icons-round mybk-page-icon">chevron_left</span></button>';
      for (var i = 1; i <= totalPages; i++) {
        html += '<button class="mybk-page-btn' + (i === currentPage ? ' active' : '') + '" type="button" onclick="goPage(' + i + ')">' + i + '</button>';
      }
      html += '<button class="mybk-page-btn" type="button"' + (currentPage >= totalPages ? ' disabled' : ' onclick="goPage(' + (currentPage + 1) + ')"') + '><span class="material-icons-round mybk-page-icon">chevron_right</span></button>';
      pagEl.innerHTML = html;
    }

    function goPage(n) { currentPage = n; renderBookings(); window.scrollTo({top: 300, behavior: 'smooth'}); }

    // Tab switching
    document.querySelectorAll('.mybk-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.mybk-tab').forEach(function(t) { t.classList.remove('active'); });
        this.classList.add('active');
        currentFilter = this.getAttribute('data-filter');
        currentPage = 1;
        renderBookings();
      });
    });

    function handleBookingAction(action) {
      if (action === 'access') { location.href = '../car-access/car-access.html'; return; }
      if (action === 'extend' || action === 'view-upcoming') { location.href = '../car-details/booking/booking.html'; return; }
      if (action === 'report') { location.href = '../support/support.html'; return; }
      if (action === 'directions') { location.href = '../../../shared/pages/footer/contact/contact.html'; return; }
      if (action === 'cancel') { alert('Booking cancellation request submitted for review.'); }
    }

    // Load bookings from Supabase
    async function loadMyBookings() {
      try {
        var sb = window.supabaseClient;
        if (!sb) { console.warn('[MyBookings] Supabase not ready'); return; }
        var userResult = await sb.auth.getUser();
        var user = userResult && userResult.data && userResult.data.user;

        if (user) {
          allBookings = await WeDriveAPI.getCustomerBookings(user.id);
        } else {
          // Demo mode - load all bookings
          allBookings = await WeDriveAPI.getBookings();
        }

        renderStats(allBookings);
        renderActiveRental(allBookings);
        renderBookings();
      } catch (err) {
        console.error('[MyBookings] Load error:', err);
        document.getElementById('mybk-list').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);">Failed to load bookings. Please try again.</div>';
      }
    }

    // Init after page load
    window.addEventListener('DOMContentLoaded', function() {
      setTimeout(loadMyBookings, 500);
    });
  </script>
</body>
</html>
